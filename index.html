<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            transition: background-color 0.5s ease;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
        }

        body.dark-mode { --bg-color: #121212; }

        model-viewer { width: 100%; height: 100vh; background-color: transparent; outline: none; }

        .ui-element {
            position: absolute;
            fill: #ffffff !important;
            color: #ffffff !important;
            mix-blend-mode: difference;
            background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100; 
            transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        
        .ui-element:hover { transform: scale(1.1); }

        .reset-button { top: 32px; left: 40px; width: 32px; height: 32px; }
        .action-button { top: 32px; right: 40px; width: 32px; height: 32px; }
        .theme-button { bottom: 40px; left: 40px; width: 32px; height: 32px; }

        .ui-element svg { width: 100%; height: 100%; display: block; }
        #progress-bar { 
            position: absolute; top: 0; left: 0; width: 0%; height: 2px; 
            background-color: #ffffff; mix-blend-mode: difference;
            transition: width 0.3s; z-index: 20; 
        }
        [slot="poster"] { display: none; }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <!-- LEWA IKONA: Celownik (2 strzałki do środka po przekątnej) -->
    <button class="ui-element reset-button" id="reset-view" title="Resetuj widok">
        <svg viewBox="0 0 24 24">
            <!-- Górna prawa strzałka skierowana do środka -->
            <path d="M14 7h3v3h2V4h-5v2z"/>
            <!-- Dolna lewa strzałka skierowana do środka -->
            <path d="M10 17H7v-3H5v6h5v-2z"/>
        </svg>
    </button>

    <!-- PRAWA IKONA: Fullscreen (2 strzałki na zewnątrz po przekątnej) -->
    <button class="ui-element action-button" id="main-action">
        <span id="ar-text" style="font-weight: 600; font-size: 18px; letter-spacing: 5px;">AR</span>
        <svg id="fullscreen-icon" viewBox="0 0 24 24" style="display: none;">
            <!-- Górna prawa strzałka na zewnątrz -->
            <path d="M14 4h6v6h-2V7h-3V4z"/>
            <!-- Dolna lewa strzałka na zewnątrz -->
            <path d="M4 14h2v3h3v2H4v-6z"/>
        </svg>
    </button>

    <button class="ui-element theme-button" id="theme-toggle" title="Zmień tryb tła">
        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/>
        </svg>
    </button>

    <model-viewer 
        id="clock-model"
        src="ZEGAR.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls disable-pan
        shadow-intensity="1.5" shadow-softness="1"
        exposure="1.6" environment-intensity="1.8"
        autoplay auto-rotate
        camera-orbit="0deg 82deg 242%" 
        orbit-sensitivity="1.8" 
        interpolation-decay="150" 
        auto-rotate-delay="2000"
        min-camera-orbit="auto auto 5%"
        max-camera-orbit="auto auto 1000%"
        touch-action="none">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#clock-model');
        const progressBar = document.querySelector('#progress-bar');
        const actionButton = document.querySelector('#main-action');
        const arText = document.querySelector('#ar-text');
        const fsIcon = document.querySelector('#fullscreen-icon');
        const body = document.body;

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (!isMobile) { arText.style.display = 'none'; fsIcon.style.display = 'block'; }

        actionButton.addEventListener('click', () => {
            if (isMobile) { modelViewer.activateAR(); } 
            else {
                if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); } 
                else { document.exitFullscreen(); }
            }
        });

        document.querySelector('#reset-view').addEventListener('click', () => {
            modelViewer.cameraOrbit = "0deg 82deg 242%";
            modelViewer.fieldOfView = "auto";
        });

        document.querySelector('#theme-toggle').addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            modelViewer.exposure = body.classList.contains('dark-mode') ? "2.8" : "1.6";
        });

        modelViewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress * 100;
            progressBar.style.width = `${progress}%`;
            if (progress === 100) setTimeout(() => progressBar.style.opacity = '0', 500);
        });
    </script>
</body>
</html>
