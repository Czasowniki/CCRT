<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
        }

        model-viewer { 
            width: 100%; 
            height: 100vh; 
            background-color: #ffffff;
            --poster-color: #ffffff;
        }

        .ar-button {
            background: none;
            border: none;
            position: absolute;
            top: 40px;
            right: 40px;
            padding: 10px;
            font-size: 18px; 
            font-weight: 800; 
            color: #404040; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px; 
            z-index: 10;
        }

        [slot="poster"] {
            display: none;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="ZEGAR.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        disable-pan
        
        shadow-intensity="1.5" 
        shadow-softness="1"
        exposure="1.6" 
        environment-intensity="1.8"
        autoplay 
        auto-rotate
        
        /* SKALA POCZĄTKOWA */
        camera-orbit="0deg 75deg 160%" 

        /* POPRAWIONA HAPTYKA */
        /* Zwiększona czułość - teraz jeden ruch palcem obróci go o wiele bardziej */
        orbit-sensitivity="1.8" 
        
        /* Zmniejszone tłumienie - model jest lżejszy w ruszaniu */
        interpolation-decay="100" 
        
        auto-rotate-delay="2000"
        
        /* ZAKRESY ZOOMU */
        min-camera-orbit="auto auto 5%"
        max-camera-orbit="auto auto 500%"
        
        touch-action="none">
        
        <div slot="poster"></div>

        <button slot="ar-button" class="ar-button">
            WEJDŹ W AR
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector('model-viewer');
        modelViewer.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>

</body>
</html>
