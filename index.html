<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Czasowniki CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; }
        body { 
            margin: 0; background-color: var(--bg-color); 
            transition: background-color 0.5s ease;
            height: 100vh; height: 100svh; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body.dark-mode { --bg-color: #121212; }

        model-viewer { width: 100%; height: 100%; background-color: transparent; outline: none; }

        .ui-element {
            position: absolute;
            background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            outline: none;
            mix-blend-mode: difference;
            color: #ffffff !important; 
            fill: #ffffff !important;
            text-transform: uppercase;
        }

        .brand-btn { 
            top: 32px; 
            font-weight: 600; 
            font-size: 15px; 
            letter-spacing: 0.2em; 
        }
        .brand-ccrt { left: 32px; }
        .brand-czasowniki { right: 32px; text-align: right; }

        .info-panel {
            position: absolute; top: 62px; color: #ffffff; mix-blend-mode: difference;
            opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 90;
            font-weight: 300; font-size: 11px; line-height: 1.6; letter-spacing: 0.05em;
            text-transform: none; /* Małe litery w opisach */
        }
        .info-panel.visible { opacity: 1; pointer-events: auto; }
        #panel-ccrt { left: 32px; }
        #panel-czasowniki { right: 32px; text-align: right; max-width: 280px; }

        .icon-btn { width: 28px; height: 28px; bottom: 40px; display: flex; align-items: center; justify-content: center; }
        .icon-btn svg { width: 20px; height: 20px; }
        
        #ar-label {
            font-weight: 800; font-size: 16px; 
            display: flex; align-items: center; justify-content: center;
            width: 20px; height: 20px;
        }

        .btn-theme { left: 32px; }
        .btn-pause { left: 36%; transform: translateX(-50%); }
        .btn-action { left: 63%; transform: translateX(-50%); }
        .btn-reset { right: 32px; }

        @media (min-width: 769px) {
            .brand-btn { font-size: 19px; top: 40px; }
            .info-panel { font-size: 12px; top: 80px; }
            #panel-czasowniki { max-width: 450px; }
            .icon-btn { width: 32px; height: 32px; }
            .icon-btn svg { width: 24px; height: 24px; }
            #ar-label { font-size: 20px; width: 24px; height: 24px; }
        }
    </style>
</head>
<body>

    <button class="ui-element brand-btn brand-ccrt" id="toggle-ccrt">CCRT</button>
    <div id="panel-ccrt" class="info-panel">Mechanizm kwarcowy<br>120x100x100 mm<br>Druk 3D PLA</div>

    <button class="ui-element brand-btn brand-czasowniki" id="toggle-czasowniki">CZASOWNIKI</button>
    <div id="panel-czasowniki" class="info-panel">Obiekty kinetyczne badające granicę między precyzyjną inżynierią a wizualnym absurdem.</div>

    <button class="ui-element icon-btn btn-theme" id="theme-toggle">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-pause" id="pause-toggle">
        <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-action" id="action-toggle">
        <span id="ar-label" style="display:none;">AR</span>
        <svg id="fs-icon" viewBox="0 0 24 24" style="display:none;"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-reset" id="reset-view">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
    </button>

    <model-viewer 
        id="clock-model"
        src="ZEGAR.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls disable-pan
        shadow-intensity="1" shadow-softness="1"
        exposure="1.6" environment-intensity="1.8"
        autoplay auto-rotate rotation-per-second="0deg"
        camera-orbit="0deg 55deg 180%" camera-target="0m 0.04m 0m"
        min-camera-orbit="auto auto 100%" max-camera-orbit="auto auto 600%"
        interaction-prompt="none">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#clock-model');

        modelViewer.addEventListener('load', () => {
            let speed = 0;
            const accel = setInterval(() => {
                speed += 0.4;
                modelViewer.rotationPerSecond = `${speed}deg`;
                if (speed >= 10) clearInterval(accel);
            }, 100);
        });

        document.querySelector('#reset-view').onclick = () => {
            const isMobile = window.innerWidth < 768;
            modelViewer.cameraOrbit = isMobile ? "0deg 55deg 165%" : "0deg 55deg 180%";
            modelViewer.cameraTarget = isMobile ? "0m 0.06m 0m" : "0m 0.04m 0m";
            modelViewer.fieldOfView = "auto";
        };

        const pauseBtn = document.getElementById('pause-toggle');
        pauseBtn.onclick = () => {
            const isPaused = pauseBtn.dataset.paused === "true";
            if (!isPaused) {
                modelViewer.pause();
                document.getElementById('icon-pause').style.display = 'none';
                document.getElementById('icon-play').style.display = 'block';
                pauseBtn.dataset.paused = "true";
            } else {
                modelViewer.play();
                document.getElementById('icon-pause').style.display = 'block';
                document.getElementById('icon-play').style.display = 'none';
                pauseBtn.dataset.paused = "false";
            }
        };

        const togglePanel = (id) => {
            const p = document.getElementById(id);
            const other = id === 'panel-ccrt' ? 'panel-czasowniki' : 'panel-ccrt';
            document.getElementById(other).classList.remove('visible');
            p.classList.toggle('visible');
        };
        document.getElementById('toggle-ccrt').onclick = () => togglePanel('panel-ccrt');
        document.getElementById('toggle-czasowniki').onclick = () => togglePanel('panel-czasowniki');

        document.getElementById('theme-toggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            modelViewer.exposure = isDark ? "1.6" : "2.8";
            document.querySelector('meta[name="theme-color"]').setAttribute('content', isDark ? '#121212' : '#ffffff');
        };

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            document.getElementById('ar-label').style.display = 'flex';
            document.getElementById('action-toggle').onclick = () => modelViewer.activateAR();
        } else {
            document.getElementById('fs-icon').style.display = 'block';
            document.getElementById('action-toggle').onclick = () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };
        }
    </script>
</body>
</html>
