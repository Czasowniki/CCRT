<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Czasowniki CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; }
        body { 
            margin: 0; background-color: var(--bg-color); 
            transition: background-color 0.5s ease;
            height: 100vh; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        body.dark-mode { --bg-color: #121212; }
        model-viewer { width: 100%; height: 100vh; background-color: transparent; outline: none; }

        /* BAZA DLA WSZYSTKICH ELEMENTÓW UI */
        .ui-element {
            position: absolute;
            background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100;
            mix-blend-mode: difference;
            color: #f0f0f0 !important;
            fill: #f0f0f0 !important;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1);
            will-change: transform; /* Naprawa rozmycia */
            backface-visibility: hidden;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            text-decoration: none !important;
        }

        /* SPECYFICZNE SKALOWANIE DLA TEKSTU U GÓRY (SUBTELNE) */
        .brand-btn:hover { transform: scale(1.03); }
        .brand-btn:active { transform: scale(1.02); }

        /* SPECYFICZNE SKALOWANIE DLA IKON (MOCNIEJSZE) */
        .icon-btn:hover { transform: scale(1.1); }
        .icon-btn:active { transform: scale(1.05); }

        /* ŚRODKOWE IKONY (NAPRAWA POZYCJI) */
        .centered { transform: translateX(-50%) scale(1); }
        .centered:hover { transform: translateX(-50%) scale(1.1); }
        .centered:active { transform: translateX(-50%) scale(1.05); }

        /* GÓRA */
        .brand-btn { top: 32px; font-weight: 700; font-size: 18px; letter-spacing: 2px; }
        .brand-ccrt { left: 32px; }
        .brand-czasowniki { right: 32px; text-align: right; }

        .info-panel {
            position: absolute; top: 60px; color: #f0f0f0; mix-blend-mode: difference;
            opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 90;
            font-weight: 100; font-size: 13px; line-height: 1.5;
        }
        .info-panel.visible { opacity: 1; pointer-events: auto; }
        #panel-ccrt { left: 32px; }
        #panel-czasowniki { right: 32px; text-align: right; max-width: 220px; }

        /* DOLNA BELKA */
        .btn-0 { bottom: 40px; left: 32px; }
        .btn-33 { bottom: 40px; left: 33.33%; }
        .btn-66 { bottom: 40px; left: 66.66%; }
        .btn-99 { bottom: 40px; right: 32px; }

        .icon-btn { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
        .icon-btn svg { width: 100%; height: 100%; }

        @media (min-width: 769px) {
            .brand-btn { font-size: 21px; }
            .brand-ccrt { left: 40px; }
            .brand-czasowniki { right: 40px; }
            .info-panel { font-size: 18px; top: 75px; }
            #panel-ccrt { left: 40px; }
            #panel-czasowniki { right: 40px; max-width: 450px; }
            .btn-0 { left: 40px; }
            .btn-99 { right: 40px; }
            .icon-btn { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>

    <button class="ui-element brand-btn brand-ccrt" id="toggle-ccrt">CCRT</button>
    <div id="panel-ccrt" class="info-panel">Mechanizm kwarcowy<br>120x100x100 mm<br>Druk 3D PLA</div>

    <button class="ui-element brand-btn brand-czasowniki" id="toggle-czasowniki">CZASOWNIKI</button>
    <div id="panel-czasowniki" class="info-panel">Obiekty kinetyczne badające granicę między precyzyjną inżynieryjną a wizualnym absurdem.</div>

    <button class="ui-element icon-btn btn-0" id="theme-toggle">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-33 centered" id="pause-toggle">
        <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-66 centered" id="action-toggle">
        <span id="ar-label" style="font-weight:800; font-size:16px; letter-spacing:2px; display:none;">AR</span>
        <svg id="fs-icon" viewBox="0 0 24 24" style="display:none;"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-99" id="reset-view">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
    </button>

    <model-viewer 
        id="clock-model"
        src="ZEGAR.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls disable-pan
        shadow-intensity="10" 
        shadow-softness="0.1"
        exposure="1.6" 
        environment-intensity="1.8"
        autoplay auto-rotate
        camera-orbit="0deg 55deg 180%"
        camera-target="0m 0.04m 0m"
        min-camera-orbit="auto auto 100%"
        max-camera-orbit="auto auto 600%"
        interaction-prompt="none">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#clock-model');

        const goHome = () => {
            const isMobile = window.innerWidth < 768;
            modelViewer.cameraOrbit = isMobile ? "0deg 55deg 165%" : "0deg 55deg 180%";
            modelViewer.cameraTarget = isMobile ? "0m 0.06m 0m" : "0m 0.04m 0m";
            modelViewer.fieldOfView = "auto";
        };
        document.querySelector('#reset-view').onclick = goHome;

        const pauseBtn = document.getElementById('pause-toggle');
        const iconPause = document.getElementById('icon-pause');
        const iconPlay = document.getElementById('icon-play');
        let isPaused = false;

        pauseBtn.onclick = () => {
            isPaused = !isPaused;
            if (isPaused) {
                modelViewer.pause();
                iconPause.style.display = 'none';
                iconPlay.style.display = 'block';
            } else {
                modelViewer.play();
                iconPause.style.display = 'block';
                iconPlay.style.display = 'none';
            }
        };

        const togglePanel = (show, hide) => {
            document.getElementById(show).classList.toggle('visible');
            document.getElementById(hide).classList.remove('visible');
        };
        document.getElementById('toggle-ccrt').onclick = () => togglePanel('panel-ccrt', 'panel-czasowniki');
        document.getElementById('toggle-czasowniki').onclick = () => togglePanel('panel-czasowniki', 'panel-ccrt');

        document.getElementById('theme-toggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
            modelViewer.exposure = document.body.classList.contains('dark-mode') ? "2.8" : "1.6";
        };

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            document.getElementById('ar-label').style.display = 'block';
            document.getElementById('action-toggle').onclick = () => modelViewer.activateAR();
        } else {
            document.getElementById('fs-icon').style.display = 'block';
            document.getElementById('action-toggle').onclick = () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };
        }

        window.addEventListener('load', goHome);
    </script>
</body>
</html>
