<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monografia Naukowa - Wizualizacja 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: "Times New Roman", Times, serif; 
        }
        model-viewer { 
            width: 85%; 
            height: 80vh; 
            background-color: #ffffff;
            --poster-color: transparent;
        }

        /* Stylizacja napisu AR - bez ramki, w prawym górnym rogu */
        .ar-button {
            background: none;
            border: none;
            position: absolute;
            top: 10px;    /* Maksymalnie w górę */
            right: 10px;  /* Maksymalnie w prawo */
            padding: 5px;
            font-size: 11px;
            font-weight: bold;
            color: #7f8c8d; /* Subtelny szary, żeby nie odciągać uwagi */
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .ar-button:hover {
            color: #2c3e50; /* Delikatne przyciemnienie przy najechaniu */
        }
    </style>
</head>
<body>

    <model-viewer 
        src="ZEGAR.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1.5" 
        shadow-softness="1"
        exposure="1.6" 
        environment-intensity="1.8"
        autoplay 
        auto-rotate
        camera-orbit="0deg 75deg 120%" 
        min-camera-orbit="auto auto 100%"
        touch-action="pan-y">
        
        <!-- Krótki, profesjonalny napis bez ramki -->
        <button slot="ar-button" class="ar-button">
            Aktywuj tryb AR
        </button>

    </model-viewer>

</body>
</html>
